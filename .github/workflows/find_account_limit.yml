name: Find Account Limit
on: [workflow_dispatch]

jobs:
  analyze:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Download IPA with token
        run: |
          curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases" | \
              python3 -c "import sys,json;r=json.load(sys.stdin);[print(a['url']) for a in r[1]['assets'] if 'Telegram.ipa' in a['name']]" | head -1)" \
            -o /tmp/Telegram.ipa
          ls -lh /tmp/Telegram.ipa

      - name: Extract
        run: |
          unzip -q /tmp/Telegram.ipa -d /tmp/ipa/
          cp "$(find /tmp/ipa -name 'TelegramUIFramework.framework' -type d | head -1)/TelegramUIFramework" /tmp/TelegramUIFramework
          ls -lh /tmp/TelegramUIFramework

      - name: Symbol + CMP scan
        run: |
          python3 -c "
import struct
with open('/tmp/TelegramUIFramework','rb') as f:
    d=f.read()
ncmds=struct.unpack('<I',d[16:20])[0]
pos=32
text_off=text_size=symoff=stroff=nsyms=0
for _ in range(ncmds):
    ct,cs=struct.unpack('<II',d[pos:pos+8])
    if ct==0x2:
        symoff,stroff,nsyms=struct.unpack('<III',d[pos+8:pos+20])
    if ct==0x19 and d[pos+8:pos+24].split(b'\x00')[0].decode()=='__TEXT':
        ns=struct.unpack('<I',d[pos+72:pos+76])[0]
        sec=pos+80
        for _ in range(ns):
            sn=d[sec:sec+16].split(b'\x00')[0].decode()
            if sn=='__text':
                text_off=struct.unpack('<Q',d[sec+32:sec+40])[0]
                text_size=struct.unpack('<Q',d[sec+40:sec+48])[0]
            sec+=80
    pos+=cs

print(f'SYMBOLS: {nsyms} total')
for s in range(nsyms):
    nl=symoff+s*16
    name=d[stroff+struct.unpack('<I',d[nl:nl+4])[0]:].split(b'\x00')[0].decode(errors='replace')
    if 'NumberOf' in name:
        val=struct.unpack('<Q',d[nl+8:nl+16])[0]
        print(f'  SYM: {name} = 0x{val:x}')

print(f'__text: 0x{text_off:x} size={text_size}')
# Install capstone
import subprocess
subprocess.run(['pip3','install','capstone'],capture_output=True)
from capstone import *
text=d[text_off:text_off+min(text_size,512000)]
md=Cs(CS_ARCH_ARM64,CS_MODE_ARM)
md.skipdata=True
for insn in md.disasm(text[:min(len(text),8192)],text_off):
    if insn.mnemonic=='cmp' and insn.operands[1].type==1 and insn.operands[1].value.imm in(3,4):
        print(f'  0x{insn.address:x}: cmp {insn.op_str}')
" 2>&1

      - name: Upload analysis
        uses: actions/upload-artifact@v4
        with:
          name: analysis
          path: /tmp/*.txt
