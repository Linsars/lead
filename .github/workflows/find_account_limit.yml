name: Find Account Limit
on: workflow_dispatch

jobs:
  analyze:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: pip3 install capstone

      - name: Download IPA & extract framework
        run: |
          gh release download ipa-telegram-12.8 --repo ${{ github.repository }} --pattern 'Telegram.ipa' --dir /tmp
          unzip -q /tmp/Telegram.ipa -d /tmp/ipa/
          cp "$(find /tmp/ipa -name 'TelegramUIFramework.framework' -type d | head -1)/TelegramUIFramework" /tmp/TelegramUIFramework
          ls -lh /tmp/TelegramUIFramework

      - name: Search symbol table for maximumNumberOfAccounts
        run: |
          python3 -c '
import struct
with open("/tmp/TelegramUIFramework","rb") as f:
    d = f.read()
ncmds=struct.unpack("<I",d[16:20])[0]
pos=32
symoff=stroff=nsyms=0
for _ in range(ncmds):
    ct,cs=struct.unpack("<II",d[pos:pos+8])
    if ct==0x2:
        symoff,stroff,nsyms=struct.unpack("<III",d[pos+8:pos+20])
    pos+=cs
print(f"symtab: {nsyms} symbols at file offset 0x{symoff:x}, strtab at 0x{stroff:x}")
for s in range(nsyms):
    nl=symoff+s*16
    n_strx=struct.unpack("<I",d[nl:nl+4])[0]
    n_value=struct.unpack("<Q",d[nl+8:nl+16])[0]
    name=d[stroff+n_strx:].split(b"\x00")[0].decode(errors="replace")
    if "maximum" in name.lower() and ("account" in name.lower() or "premium" in name.lower()):
        print(f"  {name}: value=0x{n_value:x}")
'

      - name: Find maxNumberOfAccounts refs in assembly
        run: |
          python3 -c '
import struct
from capstone import *
with open("/tmp/TelegramUIFramework","rb") as f:
    d = f.read()
ncmds=struct.unpack("<I",d[16:20])[0]
pos=32
text_off=text_size=0
for _ in range(ncmds):
    ct,cs=struct.unpack("<II",d[pos:pos+8])
    if ct==0x19:
        segname=d[pos+8:pos+24].split(b"\x00")[0].decode()
        if segname=="__TEXT":
            nsects=struct.unpack("<I",d[pos+72:pos+76])[0]
            sec=pos+80
            for _ in range(nsects):
                sn=d[sec:sec+16].split(b"\x00")[0].decode()
                if sn=="__text":
                    text_off=struct.unpack("<Q",d[sec+32:sec+40])[0]
                    text_size=struct.unpack("<Q",d[sec+40:sec+48])[0]
                sec+=80
    pos+=cs
print(f"__text: 0x{text_off:x} size={text_size}")
text=d[text_off:text_off+text_size]
md=Cs(CS_ARCH_ARM64,CS_MODE_ARM)
md.skipdata=True
count=0
for i in range(0,min(len(text),10*1024*1024),4*1024):
    chunk=text[i:i+4*1024]
    for insn in md.disasm(chunk,text_off+i):
        if insn.mnemonic=="cmp" and insn.operands[1].type==1:
            imm=insn.operands[1].value.imm
            if imm in(3,4):
                count+=1
                if count<=30:
                    print(f"0x{insn.address:x}: cmp {insn.op_str}")
print(f"\nTotal CMP #3/#4 in first 10MB: {count}")
'

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: analysis-results
          path: /tmp/*.txt
          retention-days: 7
