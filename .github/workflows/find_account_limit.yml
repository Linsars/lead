name: Analyze & Patch Account Limit

on: workflow_dispatch

jobs:
  patch:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      
      - name: Download IPA
        run: |
          gh release download ipa-telegram-12.8 --repo ${{ github.repository }} --pattern 'Telegram.ipa' --dir /tmp
          ls -lh /tmp/Telegram.ipa

      - name: Extract Framework
        run: |
          unzip -q /tmp/Telegram.ipa -d /tmp/ipa/
          FRAMEWORK=$(find /tmp/ipa -name "TelegramUIFramework.framework" -type d | head -1)
          cp "$FRAMEWORK/TelegramUIFramework" /tmp/TelegramUIFramework
          ls -lh /tmp/TelegramUIFramework

      - name: Find CMP #3 instructions with context
        run: |
          python3 -c "
import struct, sys
from capstone import *

# Load binary
with open('/tmp/TelegramUIFramework','rb') as f:
    d = f.read()

# Parse Mach-O
ncmds = struct.unpack('<I', d[16:20])[0]
pos = 32
text_off = text_size = 0
str_off = 0  # reflstr offset

for _ in range(ncmds):
    ct = struct.unpack('<I', d[pos:pos+4])[0]
    cs = struct.unpack('<I', d[pos+4:pos+8])[0]
    if ct == 0x19:
        segname = d[pos+8:pos+24].split(b'\x00')[0].decode()
        if segname == '__TEXT':
            nsects = struct.unpack('<I', d[pos+72:pos+76])[0]
            sec = pos + 80
            for _ in range(nsects):
                sn = d[sec:sec+16].split(b'\x00')[0].decode()
                if sn == '__text':
                    text_off = struct.unpack('<Q', d[sec+32:sec+40])[0]
                    text_size = struct.unpack('<Q', d[sec+40:sec+48])[0]
                if sn == '__swift5_reflstr':
                    str_off = struct.unpack('<Q', d[sec+32:sec+40])[0]
                sec += 80
    pos += cs

print(f'__text: 0x{text_off:x} size={text_size}')
print(f'__swift5_reflstr: 0x{str_off:x}')

text = d[text_off:text_off+text_size]

# Find maximumPremiumNumberOfAccounts string offset for reference
premium_str = d.find(b'maximumPremiumNumberOfAccounts')
normal_str = d.find(b'maximumNumberOfAccounts')
print(f'String: premium=0x{premium_str:x} normal=0x{normal_str:x}')

# Use capstone to find all CMP #3/#4 with surrounding context
md = Cs(CS_ARCH_ARM64, CS_MODE_ARM)
md.skipdata = True
md.detail = True

# Search for ADRP+XREF to the account limit strings
# First find all ADRP instructions that reference near the strings
account_refs = set()

# Search in 1MB steps for performance
chunk = 1024*1024
for start in range(0, len(text), chunk):
    end = min(start + chunk, len(text))
    for insn in md.disasm(text[start:end], text_off + start):
        if insn.mnemonic == 'cmp' and insn.operands[1].type == 1:
            imm = insn.operands[1].value.imm
            if imm == 3 or imm == 4:
                # Get context: 3 instructions before
                ctx = []
                for prev_insn in md.disasm(text[max(0,insn.address-text_off-16):insn.address-text_off], insn.address-16):
                    ctx.append(f'{prev_insn.mnemonic} {prev_insn.op_str}')
                print(f'0x{insn.address:x}: {\" | \".join(ctx[-3:])} | cmp {insn.op_str}')
        if insn.address - text_off > 50*1024*1024:
            break
    print(f'Scanned 0x{start:x}...')
    if start > 50*1024*1024:
        break
" 2>&1 | tail -50

      - name: Find symbol address
        run: |
          python3 -c "
import struct
# Search for the symbol in symtab
with open('/tmp/TelegramUIFramework','rb') as f:
    d=f.read()
ncmds=struct.unpack('<I',d[16:20])[0]
pos=32
symoff=0; stroff=0; nsyms=0; linkedit_fileoff=0; linkedit_off=0
for _ in range(ncmds):
    ct=struct.unpack('<I',d[pos:pos+4])[0]
    cs=struct.unpack('<I',d[pos+4:pos+8])[0]
    if ct==0x19:
        segname=d[pos+8:pos+24].split(b'\x00')[0].decode()
        if segname=='__LINKEDIT':
            linkedit_off=struct.unpack('<Q',d[pos+24:pos+32])[0]
            linkedit_fileoff=struct.unpack('<Q',d[pos+32:pos+40])[0]
    elif ct==0x2:
        symoff=struct.unpack('<I',d[pos+8:pos+12])[0]
        stroff=struct.unpack('<I',d[pos+12:pos+16])[0]
        nsyms=struct.unpack('<I',d[pos+16:pos+20])[0]
    pos+=cs
print(f'symoff=0x{symoff:x} stroff=0x{stroff:x} nsyms={nsyms}')
for s in range(nsyms):
    nl_off=symoff+s*16
    n_strx=struct.unpack('<I',d[nl_off:nl_off+4])[0]
    n_value=struct.unpack('<Q',d[nl_off+8:nl_off+16])[0]
    name=d[stroff+n_strx:].split(b'\x00')[0].decode(errors='replace')
    if 'maximumNumberOfAccounts' in name:
        print(f'FOUND: {name} value=0x{n_value:x} strx={n_strx}')
    if 'maximumPremium' in name:
        print(f'FOUND: {name} value=0x{n_value:x} strx={n_strx}')
print('Symbol search done')
" 2>&1

      - name: Save patched binary
        run: |
          cp /tmp/TelegramUIFramework /tmp/TelegramUIFramework_patched
          # Once we know the address, we'll patch here
          ls -lh /tmp/TelegramUIFramework_patched

      - name: Upload patched framework
        uses: actions/upload-artifact@v4
        with:
          name: TelegramUIFramework_patched
          path: /tmp/TelegramUIFramework_patched
