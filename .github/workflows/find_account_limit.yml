name: Find Account Limit
on: [workflow_dispatch]

jobs:
  analyze:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download & Extract
        run: |
          curl -sL -o /tmp/Telegram.ipa \
            "https://github.com/${{ github.repository }}/releases/download/ipa-telegram-12.8/Telegram.ipa"
          unzip -q /tmp/Telegram.ipa -d /tmp/ipa
          find /tmp/ipa -name "TelegramUIFramework" -type f | head -1
          cp "$(find /tmp/ipa -name "TelegramUIFramework" -type f | head -1)" /tmp/tf
          ls -lh /tmp/tf
      
      - name: Analyze
        run: python3 ${{ github.workspace }}/.github/workflows/analyze.py
