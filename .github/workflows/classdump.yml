name: Class-Dump Telegram Frameworks
on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'IPA download URL'
        required: true

jobs:
  classdump:
    runs-on: macos-15
    steps:
      - name: Download and extract IPA
        run: |
          curl -L -o app.ipa "${{ inputs.ipa_url }}"
          unzip -q app.ipa -d extracted/
          APP_DIR=$(find extracted -name "*.app" -type d | head -1)
          echo "APP_DIR=$APP_DIR" >> $GITHUB_ENV
      
      - name: OTool all frameworks
        run: |
          mkdir -p output
          for fw in "$APP_DIR/Frameworks/"*.framework; do
            fwname=$(basename "$fw" .framework)
            fw_binary=$(find "$fw" -maxdepth 1 -type f ! -name '*.plist' ! -name '*.tbd' | head -1)
            if [ -n "$fw_binary" ]; then
              otool -ov "$fw_binary" > "output/${fwname}.otool.txt" 2>&1 || echo "otool failed for $fwname"
              echo "$fwname: $(wc -c < "output/${fwname}.otool.txt") bytes"
            fi
          done
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: otool-output
          path: output/
