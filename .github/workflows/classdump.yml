name: Class-Dump Telegram Frameworks
on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'IPA download URL'
        required: true

jobs:
  classdump:
    runs-on: macos-15
    steps:
      - name: Install class-dump
        run: |
          curl -L -o class-dump.zip https://github.com/nygard/class-dump/releases/download/1.10/class-dump-1.10.zip
          unzip -q class-dump.zip -d class-dump-bin
          sudo cp class-dump-bin/class-dump /usr/local/bin/
          chmod +x /usr/local/bin/class-dump
      
      - name: Download IPA
        run: |
          curl -L -o app.ipa "${{ inputs.ipa_url }}"
          unzip -q app.ipa -d extracted/
          APP_DIR=$(find extracted -name "*.app" -type d | head -1)
          echo "APP_DIR=$APP_DIR" >> $GITHUB_ENV
      
      - name: Class-dump main binary
        run: |
          BINARY="$APP_DIR/$(basename $APP_DIR .app)"
          mkdir -p output/main
          class-dump -H "$BINARY" -o output/main/ 2>&1 | tail -5 || echo "class-dump main failed"
          echo "=== Main binary classes ==="
          ls output/main/ 2>/dev/null | head -20
      
      - name: Class-dump frameworks
        run: |
          mkdir -p output/frameworks
          for fw in "$APP_DIR/Frameworks/"*.framework; do
            fwname=$(basename "$fw" .framework)
            fw_binary=$(find "$fw" -maxdepth 1 -type f ! -name '*.plist' ! -name '*.tbd' | head -1)
            if [ -n "$fw_binary" ]; then
              mkdir -p "output/frameworks/$fwname"
              class-dump -H "$fw_binary" -o "output/frameworks/$fwname/" 2>&1 | tail -1
              class_count=$(ls "output/frameworks/$fwname/" 2>/dev/null | wc -l)
              echo "$fwname: $class_count classes" >> output/framework_summary.txt
            fi
          done
          cat output/framework_summary.txt
      
      - name: Upload headers
        uses: actions/upload-artifact@v4
        with:
          name: classdump-headers
          path: output/
