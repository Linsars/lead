name: class-dump
on:
  release:
    types: [published]

jobs:
  classdump:
    if: github.event.release.prerelease
    runs-on: macos-15
    steps:
      - name: Download dylib
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ github.event.release.tag_name }} \
            --repo ${{ github.repository }} \
            --pattern 'Lead_1.4.2*' -O /tmp/Lead.dylib
          ls -lh /tmp/Lead.dylib

      - name: Install class-dump (pre-built)
        run: |
          # Download pre-built class-dump from official release (3.5)
          curl -sL "https://github.com/nygard/class-dump/releases/download/3.5/class-dump-3.5.tar.gz" \
            -o /tmp/class-dump.tar.gz && \
            cd /tmp && tar xzf class-dump-3.5.tar.gz && \
            sudo cp class-dump-3.5/class-dump /usr/local/bin/ && \
            class-dump --version

      - name: class-dump
        run: |
          mkdir -p /tmp/headers/lead
          class-dump --arch arm64 /tmp/Lead.dylib -H -o /tmp/headers/lead/ 2>&1 || true
          echo "=== Results ==="
          find /tmp/headers/lead -name '*.h' | wc -l
          ls /tmp/headers/lead/ 2>/dev/null | head -20

      - name: Summary
        run: |
          mkdir -p /tmp/report
          echo "=== @interface ===" > /tmp/report/summary.txt
          grep -hr "@interface" /tmp/headers/lead/ 2>/dev/null | sort -u >> /tmp/report/summary.txt
          echo "" >> /tmp/report/summary.txt
          echo "=== kFeature keys ===" >> /tmp/report/summary.txt
          strings /tmp/Lead.dylib 2>/dev/null | grep -E '^k[A-Z]' | sort -u >> /tmp/report/summary.txt
          cat /tmp/report/summary.txt

      - uses: actions/upload-artifact@v4
        with:
          name: lead-headers
          path: /tmp/headers/lead/

      - uses: actions/upload-artifact@v4
        with:
          name: lead-summary
          path: /tmp/report/
