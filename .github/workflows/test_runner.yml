name: Analyze Account Limit
on: [workflow_dispatch]
jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "START"
      - name: Download IPA
        run: curl -sL -o /tmp/tf.zip "https://github.com/Linsars/lead/releases/download/ipa-telegram-12.8/Telegram.ipa"
      - name: Extract framework
        run: |
          unzip -q /tmp/tf.zip -d /tmp/ipa
          find /tmp/ipa -name "TelegramUIFramework" -type f | head -1
          cp "$(find /tmp/ipa -name "TelegramUIFramework" -type f | head -1)" /tmp/tf
          ls -lh /tmp/tf
      - name: Symbol search
        run: python3 ${{ github.workspace }}/.github/workflows/analyze.py
