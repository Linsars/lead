name: Analyze Account Limit
on: [workflow_dispatch]
jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: curl -sL -o /tmp/tf.zip "https://github.com/Linsars/lead/releases/download/ipa-telegram-12.8/Telegram.ipa" && ls -lh /tmp/tf.zip
      - run: unzip -l /tmp/tf.zip | head -20
      - run: |
          FILE=$(python3 -c "
import zipfile
with zipfile.ZipFile('/tmp/tf.zip') as z:
    for n in z.namelist():
        if 'TelegramUIFramework' in n and n.endswith('TelegramUIFramework'):
            print(n)
            break
")
          echo "Framework: $FILE"
          python3 -c "
import zipfile
with zipfile.ZipFile('/tmp/tf.zip') as z:
    with open('/tmp/tf','wb') as f:
        f.write(z.read('$FILE'))
"
          ls -lh /tmp/tf
      - run: python3 ${{ github.workspace }}/.github/workflows/analyze.py
